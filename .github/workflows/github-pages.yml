name: Deploy Hugo site to GitHub Pages
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: self-hosted
    env:
      # Opt into Node.js 24 now (covers peaceiris/actions-hugo@v3 which is still on Node 16 internally)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5        # ← v5: Node.js 24 (requires runner >= v2.327.1)
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3  # ← v3: latest available
        with:
          hugo-version: '0.129.0'
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4      # ← keep v4 for now (see note below)
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi
          npm install postcss postcss-cli postcss-import autoprefixer

      - name: Build and Deploy
        run: |
          hugo --gc --minify

          if [ ! -d "public" ]; then
            echo "Erreur: Dossier public non trouvé après build Hugo"
            exit 1
          fi

          echo "=== Contenu généré par Hugo ==="
          ls -la public/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cd public
          git init
          git add .
          git commit -m "Deploy from ${{ github.sha }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages

          echo "✅ Site déployé vers gh-pages"
