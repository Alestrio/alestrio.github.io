name: Deploy Hugo site to GitHub Pages
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        env:
          HUGO_VERSION: '0.155.0'
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | tar -xz hugo
          ./hugo version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi
          npm install postcss postcss-cli postcss-import autoprefixer

      - name: Build and Deploy
        run: |
          ./hugo --gc --minify

          if [ ! -d "public" ]; then
            echo "Erreur: Dossier public non trouvé après build Hugo"
            exit 1
          fi

          echo "=== Contenu généré par Hugo ==="
          ls -la public/

          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy from ${{ github.sha }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages

          echo "✅ Site déployé vers gh-pages"
